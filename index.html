<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>XML to DOCX Converter</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/docx/8.2.1/docx.min.js"></script>
  <style>
    :root {
      --bg: #f7f8fa;
      --card: #ffffff;
      --text: #111827;
      --muted: #6b7280;
      --line: #e5e7eb;
      --primary: #2563eb;
      --primary-soft: #eff6ff;
      --success: #15803d;
      --error: #dc2626;
      --radius: 16px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Inter, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      justify-content: center;
      padding: 32px 16px;
    }

    .app {
      width: 100%;
      max-width: 760px;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 24px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.04);
    }

    .title {
      font-size: 28px;
      font-weight: 700;
      margin: 0 0 8px;
      letter-spacing: -0.02em;
    }

    .subtitle {
      margin: 0 0 24px;
      color: var(--muted);
      font-size: 15px;
    }

    .dropzone {
      border: 1.5px dashed #bfd3ff;
      background: #fafcff;
      border-radius: 14px;
      padding: 28px 20px;
      text-align: center;
      cursor: pointer;
      transition: 0.2s ease;
    }

    .dropzone:hover,
    .dropzone.dragover {
      background: var(--primary-soft);
      border-color: var(--primary);
    }

    .dropzone .icon {
      font-size: 36px;
      margin-bottom: 10px;
    }

    .dropzone .main {
      font-weight: 600;
      font-size: 16px;
      margin-bottom: 6px;
    }

    .dropzone .hint {
      color: var(--muted);
      font-size: 14px;
    }

    input[type="file"] {
      display: none;
    }

    .meta,
    .controls,
    .status,
    .preview {
      margin-top: 18px;
    }

    .meta {
      padding: 12px 14px;
      background: #f9fafb;
      border: 1px solid var(--line);
      border-radius: 12px;
      font-size: 14px;
      color: var(--muted);
    }

    .meta strong {
      color: var(--text);
    }

    .controls {
      display: grid;
      gap: 14px;
    }

    .row {
      display: grid;
      grid-template-columns: 1fr;
      gap: 12px;
    }

    @media (min-width: 700px) {
      .row.two {
        grid-template-columns: 1fr 1fr;
      }
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .field label {
      font-size: 14px;
      font-weight: 600;
    }

    .field input[type="text"] {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 11px 12px;
      font-size: 14px;
      outline: none;
    }

    .field input[type="text"]:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(37,99,235,0.10);
    }

    .check {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 14px;
      color: var(--text);
    }

    .actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 6px;
    }

    button {
      border: 0;
      border-radius: 10px;
      padding: 12px 16px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: 0.2s ease;
    }

    .primary {
      background: var(--primary);
      color: white;
    }

    .primary:hover {
      background: #1d4ed8;
    }

    .secondary {
      background: #f3f4f6;
      color: var(--text);
      border: 1px solid var(--line);
    }

    .secondary:hover {
      background: #e5e7eb;
    }

    button:disabled {
      opacity: 0.55;
      cursor: not-allowed;
    }

    .status {
      display: none;
      padding: 12px 14px;
      border-radius: 12px;
      font-size: 14px;
      border: 1px solid transparent;
    }

    .status.info {
      display: block;
      background: #eff6ff;
      color: #1d4ed8;
      border-color: #bfdbfe;
    }

    .status.success {
      display: block;
      background: #f0fdf4;
      color: var(--success);
      border-color: #bbf7d0;
    }

    .status.error {
      display: block;
      background: #fef2f2;
      color: var(--error);
      border-color: #fecaca;
    }

    .preview {
      border: 1px solid var(--line);
      border-radius: 12px;
      overflow: hidden;
    }

    .preview-head {
      padding: 12px 14px;
      background: #f9fafb;
      border-bottom: 1px solid var(--line);
      font-size: 14px;
      font-weight: 600;
    }

    pre {
      margin: 0;
      padding: 14px;
      max-height: 260px;
      overflow: auto;
      background: white;
      font-size: 13px;
      line-height: 1.5;
      color: #374151;
      white-space: pre-wrap;
      word-break: break-word;
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="card">
      <h1 class="title">XML → DOCX</h1>
      <p class="subtitle">Upload an XML file, preview its structure, and export it as a clean Word document.</p>

      <label class="dropzone" id="dropzone" for="xmlFile">
        <div class="icon">📄</div>
        <div class="main">Click to upload or drag & drop an XML file</div>
        <div class="hint">Only .xml files are supported</div>
      </label>

      <input type="file" id="xmlFile" accept=".xml,text/xml,application/xml" />

      <div class="meta" id="fileMeta">No file selected</div>

      <div class="controls">
        <div class="row two">
          <div class="field">
            <label for="outputName">Output file name</label>
            <input type="text" id="outputName" placeholder="converted.docx" />
          </div>

          <div class="field">
            <label>&nbsp;</label>
            <label class="check">
              <input type="checkbox" id="includeAttributes" checked />
              Include XML attributes
            </label>
          </div>
        </div>

        <div class="actions">
          <button class="secondary" id="previewBtn" disabled>Preview XML</button>
          <button class="primary" id="convertBtn" disabled>Convert to DOCX</button>
          <button class="secondary" id="resetBtn">Reset</button>
        </div>
      </div>

      <div class="status" id="status"></div>

      <div class="preview" id="previewBox" style="display:none;">
        <div class="preview-head">Preview</div>
        <pre id="previewContent"></pre>
      </div>
    </div>
  </div>

  <script>
    const fileInput = document.getElementById("xmlFile");
    const dropzone = document.getElementById("dropzone");
    const fileMeta = document.getElementById("fileMeta");
    const outputName = document.getElementById("outputName");
    const includeAttributes = document.getElementById("includeAttributes");
    const convertBtn = document.getElementById("convertBtn");
    const previewBtn = document.getElementById("previewBtn");
    const resetBtn = document.getElementById("resetBtn");
    const statusBox = document.getElementById("status");
    const previewBox = document.getElementById("previewBox");
    const previewContent = document.getElementById("previewContent");

    let selectedFile = null;
    let parsedXmlDoc = null;

    function setStatus(message, type = "info") {
      statusBox.className = `status ${type}`;
      statusBox.textContent = message;
    }

    function clearStatus() {
      statusBox.className = "status";
      statusBox.textContent = "";
    }

    function formatBytes(bytes) {
      if (!bytes && bytes !== 0) return "";
      const sizes = ["B", "KB", "MB", "GB"];
      if (bytes === 0) return "0 B";
      const i = Math.floor(Math.log(bytes) / Math.log(1024));
      return `${(bytes / Math.pow(1024, i)).toFixed(2)} ${sizes[i]}`;
    }

    function getBaseName(filename) {
      return filename.replace(/\.[^/.]+$/, "");
    }

    function isXmlFile(file) {
      return file && (
        file.name.toLowerCase().endsWith(".xml") ||
        file.type === "text/xml" ||
        file.type === "application/xml"
      );
    }

    function getDirectText(node) {
      return Array.from(node.childNodes)
        .filter(n => n.nodeType === Node.TEXT_NODE)
        .map(n => n.textContent.trim())
        .filter(Boolean)
        .join(" ");
    }

    function escapeXml(text) {
      return text
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;");
    }

    function makePreview(node, level = 0) {
      const indent = "  ".repeat(level);
      const attrs = includeAttributes.checked && node.attributes?.length
        ? " " + Array.from(node.attributes)
            .map(attr => `${attr.name}="${attr.value}"`)
            .join(" ")
        : "";

      const directText = getDirectText(node);
      let line = `${indent}<${node.nodeName}${attrs}>`;

      if (directText) line += ` ${directText}`;
      let lines = [line];

      Array.from(node.children).forEach(child => {
        lines.push(makePreview(child, level + 1));
      });

      return lines.join("\n");
    }

    async function parseSelectedFile(file) {
      const text = await file.text();
      const parser = new DOMParser();
      const xmlDoc = parser.parseFromString(text, "application/xml");
      const parseError = xmlDoc.querySelector("parsererror");

      if (parseError) {
        throw new Error("Invalid XML. Please check the file structure.");
      }

      return xmlDoc;
    }

    async function handleFile(file) {
      clearStatus();
      previewBox.style.display = "none";
      previewContent.textContent = "";
      parsedXmlDoc = null;

      if (!file) return;

      if (!isXmlFile(file)) {
        selectedFile = null;
        fileInput.value = "";
        fileMeta.innerHTML = "No valid XML file selected";
        convertBtn.disabled = true;
        previewBtn.disabled = true;
        setStatus("Please select a valid .xml file.", "error");
        return;
      }

      selectedFile = file;
      outputName.value = `${getBaseName(file.name)}.docx`;
      fileMeta.innerHTML = `<strong>${file.name}</strong> · ${formatBytes(file.size)}`;

      try {
        parsedXmlDoc = await parseSelectedFile(file);
        convertBtn.disabled = false;
        previewBtn.disabled = false;
        setStatus("XML loaded successfully.", "success");
      } catch (err) {
        selectedFile = null;
        parsedXmlDoc = null;
        convertBtn.disabled = true;
        previewBtn.disabled = true;
        setStatus(err.message, "error");
      }
    }

    fileInput.addEventListener("change", async (e) => {
      await handleFile(e.target.files[0]);
    });

    dropzone.addEventListener("dragover", (e) => {
      e.preventDefault();
      dropzone.classList.add("dragover");
    });

    dropzone.addEventListener("dragleave", () => {
      dropzone.classList.remove("dragover");
    });

    dropzone.addEventListener("drop", async (e) => {
      e.preventDefault();
      dropzone.classList.remove("dragover");
      const file = e.dataTransfer.files[0];
      fileInput.files = e.dataTransfer.files;
      await handleFile(file);
    });

    previewBtn.addEventListener("click", () => {
      if (!parsedXmlDoc) {
        setStatus("Please upload a valid XML file first.", "error");
        return;
      }

      const root = parsedXmlDoc.documentElement;
      previewContent.textContent = makePreview(root);
      previewBox.style.display = "block";
      setStatus("Preview generated.", "info");
    });

    convertBtn.addEventListener("click", async () => {
      if (!selectedFile || !parsedXmlDoc) {
        setStatus("Please upload a valid XML file first.", "error");
        return;
      }

      if (!window.docx) {
        setStatus("DOCX library failed to load. Check your internet connection or CDN access.", "error");
        return;
      }

      try {
        setStatus("Converting XML to DOCX...", "info");
        convertBtn.disabled = true;

        const {
          Document,
          Packer,
          Paragraph,
          TextRun,
          HeadingLevel
        } = window.docx;

        const paragraphs = [];

        paragraphs.push(
          new Paragraph({
            text: "XML to DOCX Export",
            heading: HeadingLevel.HEADING_1,
            spacing: { after: 300 }
          })
        );

        paragraphs.push(
          new Paragraph({
            children: [
              new TextRun({ text: `Source file: ${selectedFile.name}`, italics: true })
            ],
            spacing: { after: 200 }
          })
        );

        function addNodeToDoc(node, level = 0) {
          const attrs = includeAttributes.checked && node.attributes?.length
            ? " [" + Array.from(node.attributes)
                .map(attr => `${attr.name}="${attr.value}"`)
                .join(", ") + "]"
            : "";

          const directText = getDirectText(node);
          const text = directText ? `${node.nodeName}${attrs}: ${directText}` : `${node.nodeName}${attrs}`;

          paragraphs.push(
            new Paragraph({
              children: [
                new TextRun({
                  text,
                  bold: level === 0
                })
              ],
              indent: {
                left: level * 360
              },
              spacing: {
                after: 100
              }
            })
          );

          Array.from(node.children).forEach(child => addNodeToDoc(child, level + 1));
        }

        addNodeToDoc(parsedXmlDoc.documentElement, 0);

        const doc = new Document({
          sections: [
            {
              properties: {},
              children: paragraphs
            }
          ]
        });

        const blob = await Packer.toBlob(doc);

        const safeName = (outputName.value || "converted.docx").trim().endsWith(".docx")
          ? (outputName.value || "converted.docx").trim()
          : `${(outputName.value || "converted").trim()}.docx`;

        const url = URL.createObjectURL(blob);
        const link = document.createElement("a");
        link.href = url;
        link.download = safeName;
        document.body.appendChild(link);
        link.click();
        link.remove();

        setTimeout(() => URL.revokeObjectURL(url), 1000);
        setStatus("Done. Your DOCX file has been downloaded.", "success");
      } catch (err) {
        console.error(err);
        setStatus("Conversion failed. Check the XML structure and try again.", "error");
      } finally {
        convertBtn.disabled = false;
      }
    });

    resetBtn.addEventListener("click", () => {
      selectedFile = null;
      parsedXmlDoc = null;
      fileInput.value = "";
      outputName.value = "";
      fileMeta.textContent = "No file selected";
      previewContent.textContent = "";
      previewBox.style.display = "none";
      convertBtn.disabled = true;
      previewBtn.disabled = true;
      clearStatus();
    });
  </script>
</body>
</html>
